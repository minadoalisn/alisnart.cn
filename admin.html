<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>内容发布管理 - 广东艾里森光电</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft YaHei", system-ui, sans-serif; background: #0c0c0c; color: #fff; min-height: 100vh; }
    header { background: #111; border-bottom: 1px solid #333; padding: 18px 20px; display: flex; justify-content: space-between; gap: 16px; align-items: center; flex-wrap: wrap; }
    h1 { color: #ffd700; font-size: 24px; }
    main { max-width: 1200px; margin: 0 auto; padding: 28px 20px 60px; }
    .toolbar, .panel, .news-item { background: #171717; border: 1px solid #333; border-radius: 8px; padding: 18px; }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
    button, .btn { border: 0; border-radius: 6px; padding: 11px 16px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; min-height: 42px; }
    .primary { background: #ffd700; color: #000; }
    .secondary { background: #333; color: #fff; }
    .danger { background: #c91f37; color: #fff; }
    .success { background: #07c160; color: #fff; }
    .muted { color: #aaa; line-height: 1.7; }
    .grid { display: grid; grid-template-columns: 380px 1fr; gap: 18px; align-items: start; }
    label { display: block; color: #ffd700; font-weight: 700; margin: 12px 0 6px; }
    input, select, textarea { width: 100%; border: 1px solid #333; background: #0c0c0c; color: #fff; border-radius: 6px; padding: 11px; font-size: 14px; }
    textarea { min-height: 110px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .news-list { display: grid; gap: 12px; }
    .news-item { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center; }
    .news-item h3 { color: #ffd700; font-size: 17px; margin-bottom: 5px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    pre { white-space: pre-wrap; word-break: break-word; max-height: 360px; overflow: auto; background: #050505; border: 1px solid #333; padding: 14px; border-radius: 8px; color: #bbb; font-size: 12px; }
    .notice { margin: 0 0 18px; padding: 14px; border: 1px solid rgba(255,215,0,.35); background: rgba(255,215,0,.08); color: #f7df7a; border-radius: 8px; }
    @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } .news-item { grid-template-columns: 1fr; } .actions { justify-content: flex-start; } }
  </style>
</head>
<body>
<header>
  <h1>内容发布管理</h1>
  <div class="actions">
    <a class="btn secondary" href="index.html">返回首页</a>
    <a class="btn secondary" href="news.html">查看前台</a>
  </div>
</header>
<main>
  <div class="notice">这是静态站发布工具：保存后会立即更新本页预览，并生成最新 <strong>data/news.json</strong>。需要真正上线时，把下载的 JSON 提交到 GitHub；Vercel 会自动部署，站点已配置 no-cache，更新不会再被旧缓存卡住。</div>
  <div class="toolbar">
    <button class="primary" id="newBtn">新建内容</button>
    <button class="success" id="downloadBtn">下载 data/news.json</button>
    <button class="secondary" id="copyBtn">复制 JSON</button>
    <span class="muted" id="status">正在加载...</span>
  </div>
  <div class="grid">
    <section class="panel">
      <form id="newsForm">
        <input type="hidden" id="newsId">
        <label for="category">分类</label>
        <select id="category">
          <option>产品发布</option>
          <option>案例故事</option>
          <option>行业洞察</option>
          <option>技术干货</option>
          <option>痛点解决</option>
        </select>
        <label for="title">标题</label>
        <input id="title" required>
        <label for="description">描述</label>
        <textarea id="description"></textarea>
        <label for="keywords">关键词</label>
        <input id="keywords" placeholder="用逗号分隔">
        <div class="row">
          <div><label for="date">发布日期</label><input id="date" type="date" required></div>
          <div><label for="views">阅读量</label><input id="views" type="number" min="0" value="1000"></div>
        </div>
        <div class="row">
          <div><label for="image">图标</label><input id="image" value="📰"></div>
          <div><label for="gradient">封面渐变</label><input id="gradient" value="linear-gradient(135deg, #667eea 0%, #764ba2 100%)"></div>
        </div>
        <label for="content">正文</label>
        <textarea id="content" placeholder="每段一行。导出时会转换为 text 内容块。"></textarea>
        <div class="actions" style="margin-top:16px; justify-content:flex-start;">
          <button class="primary" type="submit">保存到预览</button>
          <button class="secondary" type="button" id="resetBtn">清空表单</button>
        </div>
      </form>
    </section>
    <section class="panel">
      <h2 style="font-size:20px;margin-bottom:12px;color:#ffd700;">内容列表</h2>
      <div class="news-list" id="newsList"></div>
      <h2 style="font-size:20px;margin:22px 0 12px;color:#ffd700;">JSON 预览</h2>
      <pre id="jsonPreview"></pre>
    </section>
  </div>
</main>
<script>
let newsData = [];
const $ = (id) => document.getElementById(id);

function today() { return new Date().toISOString().slice(0, 10); }
function nextId() { return newsData.length ? Math.max(...newsData.map((n) => Number(n.id) || 0)) + 1 : 1; }
function setStatus(text) { $('status').textContent = text; }

async function loadNews() {
  try {
    const res = await fetch('data/news.json?v=' + Date.now(), { cache: 'no-store' });
    newsData = await res.json();
    setStatus('已加载 ' + newsData.length + ' 条内容');
  } catch (err) {
    console.error(err);
    newsData = [];
    setStatus('加载失败，可新建后导出 JSON');
  }
  render();
  resetForm();
}

function normalizeContent(text) {
  return text.split('\n').map((line) => line.trim()).filter(Boolean).map((line) => ({ type: 'text', text: line }));
}

function fillForm(item) {
  $('newsId').value = item.id || '';
  $('category').value = item.category || '产品发布';
  $('title').value = item.title || '';
  $('description').value = item.description || '';
  $('keywords').value = item.keywords || '';
  $('date').value = item.date || today();
  $('views').value = item.views || 0;
  $('image').value = item.image || '📰';
  $('gradient').value = item.imageGradient || 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
  $('content').value = (item.content || []).map((block) => block.text || (block.items || []).join('\n')).filter(Boolean).join('\n');
}

function resetForm() { fillForm({ date: today(), views: 1000, category: '产品发布', image: '📰' }); }

function render() {
  $('newsList').innerHTML = newsData.map((item) => `
    <article class="news-item">
      <div><h3>${item.image || ''} ${item.title || '未命名内容'}</h3><p class="muted">${item.category || '-'} · ${item.date || '-'} · ID ${item.id}</p></div>
      <div class="actions"><button class="secondary" onclick="editItem(${item.id})">编辑</button><button class="danger" onclick="deleteItem(${item.id})">删除</button></div>
    </article>
  `).join('') || '<p class="muted">暂无内容。</p>';
  $('jsonPreview').textContent = JSON.stringify(newsData, null, 2);
}

function editItem(id) { const item = newsData.find((n) => Number(n.id) === Number(id)); if (item) fillForm(item); }
function deleteItem(id) { newsData = newsData.filter((n) => Number(n.id) !== Number(id)); render(); setStatus('已从预览删除，下载 JSON 后提交即可上线'); }

$('newsForm').addEventListener('submit', (event) => {
  event.preventDefault();
  const id = $('newsId').value ? Number($('newsId').value) : nextId();
  const item = {
    id,
    category: $('category').value,
    title: $('title').value.trim(),
    description: $('description').value.trim(),
    keywords: $('keywords').value.trim(),
    date: $('date').value || today(),
    views: Number($('views').value || 0),
    image: $('image').value.trim() || '📰',
    imageGradient: $('gradient').value.trim(),
    content: normalizeContent($('content').value)
  };
  const index = newsData.findIndex((n) => Number(n.id) === id);
  if (index >= 0) newsData[index] = item; else newsData.unshift(item);
  render();
  fillForm(item);
  setStatus('已保存到预览，下载 JSON 后提交到 GitHub 即可上线');
});

$('newBtn').addEventListener('click', resetForm);
$('resetBtn').addEventListener('click', resetForm);
$('copyBtn').addEventListener('click', async () => { await navigator.clipboard.writeText(JSON.stringify(newsData, null, 2)); setStatus('JSON 已复制'); });
$('downloadBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(newsData, null, 2)], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'news.json';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('已下载 news.json');
});

loadNews();
</script>
</body>
</html>
