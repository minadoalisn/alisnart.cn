  <script src="assets/js/site.js"></script>
  <script>
    async function loadLatestNews() {
      const grid = document.getElementById('news-grid');
      try {
        const response = await fetch('data/news.json?v=' + Date.now(), { cache: 'no-store' });
        const items = await response.json();
        grid.innerHTML = items
          .slice()
          .sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')) || Number(b.id || 0) - Number(a.id || 0))
          .slice(0, 24)
          .map((item) => `
            <a class="card" href="news-detail.html?id=${encodeURIComponent(item.id)}">
              <span class="tag">${item.category || '内容更新'}</span>
              <h3>${item.title || '未命名内容'}</h3>
              <p>${item.description || '查看最新项目、产品发布和行业洞察。'}</p>
              <p style="margin-top:12px;color:#666;font-size:13px;">${item.date || ''} · 阅读 ${item.views || 0}</p>
            </a>
          `).join('');
      } catch (error) {
        console.error(error);
        grid.innerHTML = '<article class="card"><span class="tag">加载失败</span><h3>最新内容暂时无法读取</h3><p>请稍后刷新页面。</p></article>';
      }
    }
    document.addEventListener('DOMContentLoaded', loadLatestNews);
  </script>
</body>
