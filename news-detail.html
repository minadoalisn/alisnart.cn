<body>

    <div class="article-container" id="article-container">
        <div class="loading">📚 正在加载新闻...</div>
    </div>

    <footer>
        <div class="footer-info">
            <p><strong>广东艾里森光电技术有限公司</strong></p>

    </footer>

    <script>
        let shareUrl = '';
        let shareTitle = '';
        let shareDesc = '';

        // 加载新闻详情
        async function loadNewsDetail() {
            try {
                // 获取URL参数
                const urlParams = new URLSearchParams(window.location.search);
                const newsId = parseInt(urlParams.get('id'));
                
                if (!newsId) {
                    showError('未找到新闻ID');
                    return;
                }

                // 加载新闻数据
                const response = await fetch('data/news.json?v=' + Date.now(), { cache: 'no-store' });
                const newsList = await response.json();
                
                // 查找对应的新闻
                const news = newsList.find(n => n.id === newsId);
                
                if (!news) {
                    showError('未找到新闻');
                    return;
                }

                // 设置分享信息
                shareUrl = window.location.href;
                shareTitle = news.title;
                shareDesc = news.description;

                // 渲染文章
                renderArticle(news);
            } catch (error) {
                console.error('加载新闻失败:', error);
                showError('加载新闻失败，请刷新页面');
            }
        }

        // 渲染文章
        function renderArticle(news) {
            const container = document.getElementById('article-container');
            container.innerHTML = `
                <div class="article-header">
                    <span class="article-category">${news.category}</span>
                    <h1 class="article-title">${news.title}</h1>
                    <div class="article-meta">
                        <span>📅 ${news.date}</span> · 
                        <span>👁️ 阅读：${news.views}</span>
                    </div>
                </div>
                
                <div class="article-image" style="background: ${news.imageGradient}">${news.image}</div>
                
                <div class="article-content" id="article-content"></div>

                <div class="share-section">
                    <h3>📤 分享文章</h3>
                    <div class="share-buttons">
                        <a class="share-btn share-wechat" onclick="shareToWeChat()" title="分享到微信">
                            <span class="share-icon">💬</span>
                            <span>微信</span>
                        </a>
                        <a class="share-btn share-weibo" onclick="shareToWeibo()" title="分享到微博">
                            <span class="share-icon">📢</span>
                            <span>微博</span>
                        </a>
                        <a class="share-btn share-qq" onclick="shareToQQ()" title="分享到QQ">
                            <span class="share-icon">🐧</span>
                            <span>QQ</span>
                        </a>
                        <a class="share-btn share-qzone" onclick="shareToQzone()" title="分享到QQ空间">
                            <span class="share-icon">⭐</span>
                            <span>QQ空间</span>
                        </a>
                        <a class="share-btn share-douyin" onclick="shareToDouyin()" title="分享到抖音">
                            <span class="share-icon">🎵</span>
                            <span>抖音</span>
                        </a>
                        <a class="share-btn share-xiaohongshu" onclick="shareToXiaohongshu()" title="分享到小红书">
                            <span class="share-icon">📖</span>
                            <span>小红书</span>
                        </a>
                    </div>
                </div>

                <div class="contact-box">
                    <h2>📞 联系我们</h2>
                    <p><strong>广东艾里森光电技术有限公司</strong> - 专注于文旅场景创新与光影艺术赋能的综合性科技服务商</p>
                    <p>📍 地址：广东省江门市江海区东升路南山工业园西区一号厂房</p>
                    <p>📞 电话：<a href="tel:18026422225">180-2642-2225</a></p>
                    <p>📧 邮箱：<a href="mailto:alisnlight@163.com">alisnlight@163.com</a></p>
                    <p>🌐 官网：<a href="https://alisnart.cn">https://alisnart.cn</a></p>
                </div>

                <div style="text-align: center;">
                    <a href="news.html" class="back-btn">← 返回新闻列表</a>
                </div>
            `;

            // 渲染文章内容
            renderContent(news.content);
        }

        // 渲染文章内容
        function renderContent(content) {
            const contentDiv = document.getElementById('article-content');
            let html = '';
            content.forEach(block => {
                if (block.type === 'text') {
                    html += `<p>${block.text}</p>`;
                } else if (block.type === 'heading') {
                    html += `<h2>${block.text}</h2>`;
                } else if (block.type === 'list') {
                    html += '<ul>';
                    block.items.forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    html += '</ul>';
                } else if (block.type === 'highlight') {
                    html += `<div class="highlight">${block.text}</div>`;
                }
            });
            contentDiv.innerHTML = html;
        }

        // 显示错误
        function showError(message) {
            const container = document.getElementById('article-container');
            container.innerHTML = `<div class="loading">⚠️ ${message}</div>`;
        }

        // 分享功能
        function shareToWeChat() {
            alert('请点击右上角，选择"发送给朋友"或"分享到朋友圈"\n\n链接已复制到剪贴板！');
            copyToClipboard(shareUrl);
        }

        function shareToWeibo() {
            var url = 'http://service.weibo.com/share/share.php?title=' + encodeURIComponent(shareTitle) + '&url=' + encodeURIComponent(shareUrl);
            window.open(url, '_blank', 'width=600,height=400');
        }

        function shareToQQ() {
            var url = 'http://connect.qq.com/widget/shareqq/index.html?title=' + encodeURIComponent(shareTitle) + '&desc=' + encodeURIComponent(shareDesc) + '&url=' + encodeURIComponent(shareUrl);
            window.open(url, '_blank', 'width=600,height=400');
        }

        function shareToQzone() {
            var url = 'https://sns.qzone.qq.com/cgi-bin/qzshare/cgi_qzshare_onekey?title=' + encodeURIComponent(shareTitle) + '&desc=' + encodeURIComponent(shareDesc) + '&url=' + encodeURIComponent(shareUrl);
            window.open(url, '_blank', 'width=600,height=400');
        }

        function shareToDouyin() {
            alert('请复制链接，打开抖音分享\n\n链接已复制到剪贴板！');
            copyToClipboard(shareUrl);
        }

        function shareToXiaohongshu() {
            alert('请复制链接，打开小红书分享\n\n链接已复制到剪贴板！');
            copyToClipboard(shareUrl);
        }

        function copyToClipboard(text) {
            var tempInput = document.createElement('input');
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadNewsDetail);
    </script>
</body>
